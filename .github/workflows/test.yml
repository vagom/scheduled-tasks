name: Test Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Test


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
     
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check secrets are configured
        env:
          # Your secrets are available as environment variables
          # Add more secrets in Settings > Secrets > Actions
          MY_MOBILE: ${{ secrets.MY_MOBILE }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          OWM_ENDPOINT: ${{ secrets.OWM_ENDPOINT }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_MSG_SERV_SID: ${{ secrets.TWILIO_MSG_SERV_SID }}
          TWILIO_PHONE: ${{ secrets.TWILIO_PHONE }}

        run: |
          if [ -z "$MY_MOBILE" ]; then
            echo "MY_MOBILE secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "MY_MOBILE is configured"
          fi

          if [ -z "$OWM_API_KEY" ]; then
            echo "OWM_API_KEY secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "OWM_API_KEY is configured"
          fi

          if [ -z "$OWM_ENDPOINT" ]; then
            echo "OWM_ENDPOINT secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "OWM_ENDPOINT is configured"
          fi

          if [ -z "$TWILIO_SID" ]; then
            echo "TWILIO_SID secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_SID is configured"
          fi

          if [ -z "$TWILIO_TOKEN" ]; then
            echo "TWILIO_TOKEN secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_TOKEN is configured"
          fi

          if [ -z "$TWILIO_MSG_SERV_SID" ]; then
            echo "TWILIO_MSG_SERV_SID secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_MSG_SERV_SID is configured"
          fi

          if [ -z "$TWILIO_PHONE" ]; then
            echo "TWILIO_PHONE secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "TWILIO_PHONE is configured"
          fi

          echo ""
          echo "All secrets are configured!"

      - name: Check required files exist
        run: |
          echo "Checking for required files..."

          if [ -f "main.py" ]; then
            echo "main.py found"
          else
            echo "main.py not found!"
            exit 1
          fi

          if [ -f "requirements.txt" ]; then
            echo "requirements.txt found"
          else
            echo "requirements.txt not found!"
            exit 1
          fi

          echo ""
          echo "All required files found!"

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
